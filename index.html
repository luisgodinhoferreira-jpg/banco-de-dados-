<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Olá Mundo Estelar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fundo azul escuro profundo */
            background-color: #0b0d17; 
            /* Criando estrelas com múltiplos gradientes radiais */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9); /* Leve transparência para o card */
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(5px); /* Efeito de vidro fosco */
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: #2d3436;
            margin: 0;
            font-size: 2.5rem;
        }

        p {
            color: #636e72;
            margin-top: 10px;
            font-weight: 500;
        } 
    </style>
</head>
<body>

    <div class="card">
        <h1>Olá, Mundo! 🌎</h1>
        <p>Meu primeiro projeto com HTML e CSS.</p>
    </div>

</body>
</html>
