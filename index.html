<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo!</title>
    
    <style>
        /* Aqui começa o CSS */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #4A90E2;
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Olá, Mundo!</h1>
        <p>Meu primeiro projeto com HTML e CSS.</p>
    </div>

</body>
</html>
