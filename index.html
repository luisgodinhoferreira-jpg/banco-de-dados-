<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Gun FPS - Minimalista</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #fff; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #333; font-size: 24px; font-weight: bold; pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid #333;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9); z-index: 10; text-align: center;
        }
        .btn-start {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: #2196F3; color: white; border: none; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">PONTOS: <span id="score">0</span></div>
    <div id="crosshair"></div>

    <div id="instructions">
        <div>
            <h1>TOY GUN INVASION</h1>
            <p>Use a arma de brinquedo para eliminar os alvos vermelhos!</p>
            <button class="btn-start" id="startBtn">CLIQUE PARA JOGAR</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0/build/three.module.js';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // --- Configurações Básicas ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Luzes
        const light = new THREE.HemisphereLight(0xffffff, 0x888888, 1.2);
        scene.add(light);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 10, 5);
        sun.castShadow = true;
        scene.add(sun);

        // Chão com Grid
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0xeeeeee })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        scene.add(new THREE.GridHelper(100, 40, 0xcccccc, 0xdddddd));

        // --- CONSTRUINDO A ARMA DE BRINQUEDO ---
        const toyGun = new THREE.Group();

        // Corpo da arma (Azul)
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(0.15, 0.25, 0.6),
            new THREE.MeshStandardMaterial({ color: 0x2196F3 })
        );
        
        // Ponta da arma (Laranja de segurança)
        const tip = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.05, 0.1, 16),
            new THREE.MeshStandardMaterial({ color: 0xFF9800 })
        );
        tip.rotation.x = Math.PI / 2;
        tip.position.z = -0.35;

        // Detalhe/Pente (Amarelo)
        const detail = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.15, 0.2),
            new THREE.MeshStandardMaterial({ color: 0xFFEB3B })
        );
        detail.position.y = -0.15;
        detail.position.z = -0.05;

        toyGun.add(body, tip, detail);
        toyGun.position.set(0.4, -0.4, -0.6); // Posição na mão
        camera.add(toyGun);
        scene.add(camera);

        // --- Alvos e NPCs ---
        const targets = [];
        function spawnTarget() {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 1.6, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xff4444 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 15 + Math.random() * 10;
            mesh.position.set(Math.cos(angle)*dist, 0.8, Math.sin(angle)*dist);
            mesh.castShadow = true;
            scene.add(mesh);
            targets.push(mesh);
        }
        for(let i=0; i<5; i++) spawnTarget();

        // --- Controles ---
        const controls = new PointerLockControls(camera, document.body);
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        let score = 0;

        startBtn.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
        controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'flex');

        // Tiro
        window.addEventListener('mousedown', () => {
            if(!controls.isLocked) return;

            // Animação de "Recuo" de brinquedo
            toyGun.position.z = -0.5;
            setTimeout(() => toyGun.position.z = -0.6, 50);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(targets);

            if(intersects.length > 0) {
                const object = intersects[0].object;
                scene.remove(object);
                targets.splice(targets.indexOf(object), 1);
                score++;
                scoreEl.innerText = score;
                spawnTarget();
            }
        });

        // Movimentação
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                if(keys['KeyW']) controls.moveForward(0.1);
                if(keys['KeyS']) controls.moveForward(-0.1);
                if(keys['KeyA']) controls.moveRight(-0.1);
                if(keys['KeyD']) controls.moveRight(0.1);

                // Animação suave da arma ao andar
                const time = Date.now() * 0.005;
                if(keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) {
                    toyGun.position.y = -0.4 + Math.sin(time * 2) * 0.01;
                }
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
