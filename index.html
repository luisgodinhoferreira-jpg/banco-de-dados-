<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futebol Estelar Neon</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b101a;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            color: white;
            padding: 20px;
        }

        .card {
            background-color: rgba(10, 15, 30, 0.85);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 255, 170, 0.1);
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 170, 0.2);
            max-width: 500px;
            width: 100%;
        }

        .title-link {
            text-decoration: none;
            display: inline-block;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 2.5rem;
            text-transform: uppercase;
            text-shadow: 0 0 10px #0fa, 0 0 20px #0fa;
            animation: flicker 2s infinite alternate;
            transition: 0.3s;
        }

        h1:hover { transform: scale(1.05); }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 10px #fff, 0 0 20px #0fa, 0 0 30px #0fa;
                opacity: 1;
            }
            20%, 22%, 24%, 55% { text-shadow: none; opacity: 0.8; }
        }

        /* Estilo da Tabela */
        .tabela-jogos {
            width: 100%;
            margin: 25px 0;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .tabela-jogos th {
            border-bottom: 1px solid #0fa;
            padding: 10px;
            color: #0fa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tabela-jogos td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .time { font-weight: bold; color: #fff; }
        .vs { color: #0fa; font-size: 0.7rem; margin: 0 5px; }

        .btn-neon {
            display: inline-block;
            padding: 12px 25px;
            color: #0fa;
            text-decoration: none;
            border: 2px solid #0fa;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.2);
        }

        .btn-neon:hover {
            background-color: #0fa;
            color: #0b101a;
            box-shadow: 0 0 30px #0fa;
        }
    </style>
</head>
<body>

    <div class="card">
        <a href="https://www.flashscore.com.br/" target="_blank" class="title-link">
            <h1>Olá, Mundo!</h1>
        </a>
        
        <p style="color: #888; margin-top: 0;">Próximas Partidas</p>

        <table class="tabela-jogos">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Confronto</th>
                    <th>Horário</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Hoje</td>
                    <td><span class="time">FLA</span> <span class="vs">VS</span> <span class="time">PAL</span></td>
                    <td>21:30</td>
                </tr>
                <tr>
                    <td>Amanhã</td>
                    <td><span class="time">COR</span> <span class="vs">VS</span> <span class="time">SAO</span></td>
                    <td>16:00</td>
                </tr>
                <tr>
                    <td>Amanhã</td>
                    <td><span class="time">BOT</span> <span class="vs">VS</span> <span class="time">CRU</span></td>
                    <td>18:30</td>
                </tr>
            </tbody>
        </table>
        
        <a href="https://ge.globo.com/futebol/brasileirao-serie-a/" target="_blank" class="btn-neon">
            Ver Tabela Completa
        </a>
    </div>

</body>
</html>
