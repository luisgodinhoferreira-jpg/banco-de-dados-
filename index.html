<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Racer Pro | Luis Gustavo</title>
    <style>
        body {
            margin: 0;
            background-color: #05080f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            text-shadow: 0 0 15px #0fa, 0 0 30px #0fa;
            color: #0fa;
            margin: 5px 0;
            letter-spacing: 5px;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 170, 0.1);
        }

        #gameCanvas {
            border: 3px solid #0fa;
            background: linear-gradient(to bottom, #111 0%, #05080f 100%);
            border-radius: 8px;
            display: block;
        }

        .ui {
            margin-top: 15px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .footer {
            margin-top: 15px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>NEON RACER</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>
    
    <div class="ui">
        <div class="score">Score: <span id="scoreVal">0</span></div>
        <p style="margin: 5px 0; font-size: 0.9rem; opacity: 0.8;">Setas ← → para pilotar | Espaço para reiniciar</p>
    </div>

    <div class="footer">Engine Visual por <b>Luis Gustavo</b></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        // Estado do Jogo
        let score = 0;
        let gameOver = false;
        let frameCount = 0;

        // Estrada (Linhas de movimento)
        let roadLines = [];
        for(let i = 0; i < 5; i++) {
            roadLines.push({ y: i * 150 });
        }

        // Jogador
        const carWidth = 45;
        const carHeight = 80;
        let carX = canvas.width / 2 - carWidth / 2;
        let carY = canvas.height - 120;
        let carSpeed = 8;
        let carTilt = 0; // Inclinação para realismo nas curvas

        // Obstáculos e Partículas
        let obstacles = [];
        let particles = [];
        let obstacleSpeed = 5;

        // Controles
        let keys = {};
        document.addEventListener("keydown", (e) => {
            keys[e.key] = true;
            if (e.key === " " && gameOver) resetGame();
        });
        document.addEventListener("keyup", (e) => keys[e.key] = false);

        function resetGame() {
            carX = canvas.width / 2 - carWidth / 2;
            obstacles = [];
            particles = [];
            score = 0;
            obstacleSpeed = 5;
            gameOver = false;
            scoreElement.innerText = "0";
            update();
        }

        function createExplosion(x, y, color) {
            for(let i = 0; i < 20; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        function drawRoad() {
            ctx.strokeStyle = "rgba(0, 255, 170, 0.2)";
            ctx.lineWidth = 2;
            
            // Linhas laterais
            ctx.beginPath();
            ctx.moveTo(20, 0); ctx.lineTo(20, canvas.height);
            ctx.moveTo(canvas.width - 20, 0); ctx.lineTo(canvas.width - 20, canvas.height);
            ctx.stroke();

            // Linhas centrais em movimento
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -frameCount * obstacleSpeed;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(carX + carWidth/2, carY + carHeight/2);
            ctx.rotate(carTilt);

            // Brilho do carro
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#0fa";
            
            // Corpo principal (Gradiente para profundidade)
            let grd = ctx.createLinearGradient(-carWidth/2, 0, carWidth/2, 0);
            grd.addColorStop(0, "#0fa");
            grd.addColorStop(0.5, "#068");
            grd.addColorStop(1, "#0fa");
            
            ctx.fillStyle = grd;
            ctx.fillRect(-carWidth/2, -carHeight/2, carWidth, carHeight);

            // Faróis (Luzes frontais)
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 10;
            ctx.fillRect(-carWidth/2 + 5, -carHeight/2, 10, 5);
            ctx.fillRect(carWidth/2 - 15, -carHeight/2, 10, 5);

            // Para-brisa
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(-carWidth/2 + 5, -carHeight/2 + 15, carWidth - 10, 25);

            ctx.restore();
        }

        function update() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("CRASH!", canvas.width / 2, canvas.height / 2);
                ctx.font = "20px Arial";
                ctx.fillText("Espaço para Tentar Novamente", canvas.width / 2, canvas.height / 2 + 50);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            // Movimentação com inclinação suave
            if (keys["ArrowRight"] && carX < canvas.width - carWidth - 20) {
                carX += carSpeed;
                carTilt = Math.min(carTilt + 0.02, 0.1);
            } else if (keys["ArrowLeft"] && carX > 20) {
                carX -= carSpeed;
                carTilt = Math.max(carTilt - 0.02, -0.1);
            } else {
                carTilt *= 0.9; // Volta ao centro
            }

            drawRoad();

            // Criar obstáculos
            if (frameCount % Math.max(20, 70 - Math.floor(score/2)) === 0) {
                let xPos = 30 + Math.random() * (canvas.width - carWidth - 60);
                obstacles.push({ x: xPos, y: -carHeight, w: carWidth, h: carHeight, color: "#f0a" });
            }

            // Loop de obstáculos
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.y += obstacleSpeed;

                // Desenho do obstáculo neon
                ctx.shadowBlur = 15;
                ctx.shadowColor = o.color;
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x, o.y, o.w, o.h);
                
                // Colisão (AABB com margem de segurança)
                if (carX < o.x + o.w - 5 && carX + carWidth > o.x + 5 &&
                    carY < o.y + o.h - 5 && carY + carHeight > o.y + 5) {
                    createExplosion(carX + carWidth/2, carY + 20, "#0fa");
                    createExplosion(o.x + o.w/2, o.y + o.h/2, "#f0a");
                    gameOver = true;
                }

                // Pontuação e aumento de velocidade POR PONTO
                if (o.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreElement.innerText = score;
                    obstacleSpeed += 0.15; // Aceleração constante
                }
            }

            // Partículas de explosão
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
                if(p.life <= 0) particles.splice(index, 1);
            });
            ctx.globalAlpha = 1;

            drawPlayer();
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
