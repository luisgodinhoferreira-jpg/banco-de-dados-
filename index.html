
      <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futebol Estelar Neon</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b101a;
            /* Imagem de fundo do estádio com overlay escuro */
            background-image: 
                linear-gradient(rgba(11, 16, 26, 0.85), rgba(11, 16, 26, 0.85)), 
                url('https://images.unsplash.com/photo-1543477380-60b6d27431e7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w0NDVjMDJ8MHwxfHNlYXJjaHw1fHxmdXRib2xsJTIwc3RhZGl1bXxlbnwwfHx8fDE3MTgxODU0OTF8MA&ixlib=rb-4.0.3&q=80&w=1080');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            padding: 20px;
        }

        .card {
            background-color: rgba(10, 15, 30, 0.9);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 0 70px rgba(0, 255, 170, 0.2);
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 170, 0.3);
            max-width: 550px;
            width: 100%;
            animation: card-entry 1s ease-out;
        }

        @keyframes card-entry {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title-link {
            text-decoration: none;
            display: inline-block;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 2.8rem;
            text-transform: uppercase;
            text-shadow: 0 0 15px #0fa, 0 0 30px #0fa;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 12px #fff, 0 0 25px #0fa, 0 0 40px #0fa;
            }
            20%, 22%, 24%, 55% { text-shadow: none; opacity: 0.85; }
        }

        .tabela-jogos {
            width: 100%;
            margin: 25px 0;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .tabela-jogos th {
            border-bottom: 2px solid #0fa;
            padding: 12px;
            color: #0fa;
            text-transform: uppercase;
            background-color: rgba(0, 255, 170, 0.05);
        }

        .tabela-jogos td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time { font-weight: bold; color: #fff; }
        .vs { color: #0fa; font-size: 0.8rem; margin: 0 8px; }

        .btn-neon {
            display: inline-block;
            padding: 12px 30px;
            color: #0fa;
            text-decoration: none;
            border: 2px solid #0fa;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.3);
            margin-bottom: 20px;
        }

        .btn-neon:hover {
            background-color: #0fa;
            color: #0b101a;
            box-shadow: 0 0 40px #0fa;
            transform: translateY(-3px);
        }

        /* Créditos do Desenvolvedor */
        .footer-credit {
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid rgba(0, 255, 170, 0.1);
            padding-top: 15px;
        }

        .footer-credit span {
            color: #0fa;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 170, 0.5);
        }
    </style>
</head>
<body>

    <div class="card">
        <a href="https://www.flashscore.com.br/" target="_blank" class="title-link">
            <h1>FUTEBOL ESTELAR</h1>
        </a>
        
        <p style="color: #bbb; margin-top: 0;">Próximas Partidas</p>

        <table class="tabela-jogos">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Confronto</th>
                    <th>Horário</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Hoje</td>
                    <td><span class="time">FLA</span> <span class="vs">VS</span> <span class="time">PAL</span></td>
                    <td>21:30</td>
                </tr>
                <tr>
                    <td>Amanhã</td>
                    <td><span class="time">COR</span> <span class="vs">VS</span> <span class="time">SAO</span></td>
                    <td>16:00</td>
                </tr>
                <tr>
                    <td>Qui, 20</td>
                    <td><span class="time">GRE</span> <span class="vs">VS</span> <span class="time">INT</span></td>
                    <td>20:00</td>
                </tr>
            </tbody>
        </table>
        
        <a href="https://ge.globo.com/futebol/brasileirao-serie-a/" target="_blank" class="btn-neon">
            Ver Tabela Completa
        </a>

        <div class="footer-credit">
            Desenvolvido por <span>Luis Gustavo</span>
        </div>
    </div>

</body>
</html>
