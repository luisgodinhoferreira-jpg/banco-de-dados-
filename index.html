<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo! Estelar Neon</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b101a;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
                radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 30px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            overflow: hidden; /* Evita barras de rolagem se muitos personagens aparecerem */
            cursor: crosshair;
        }

        .card {
            background-color: rgba(10, 15, 30, 0.8);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10; /* Garante que o card fique acima das estrelas, mas os personagens podem passar */
            pointer-events: auto;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 3rem;
            text-transform: uppercase;
            text-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff, 0 0 42px #0fa, 0 0 82px #0fa;
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px #fff, 0 0 40px #0fa, 0 0 80px #0fa;
            }
            20%, 24%, 55% { text-shadow: none; }
        }

        p {
            color: #ccc;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Estilo para os personagens que vão aparecer */
        .character {
            position: absolute;
            font-size: 2rem;
            pointer-events: none; /* Não atrapalha novos cliques */
            user-select: none;
            animation: floatUp
