<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Realista - Invasão com Iluminação Avançada</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border: 1px solid white;
        }
        #instructions {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.9);
            padding: 30px; text-align: center; border-radius: 10px;
            cursor: pointer; border: 2px solid #555; z-index: 10;
        }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: white; font-size: 24px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: red; opacity: 0; pointer-events: none;
            transition: opacity 0.1s;
        }
        .ranking-list {
            margin-top: 15px;
            text-align: left;
            font-size: 14px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">Eliminações: <span id="score">0</span></div>
    <div id="damage-flash"></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>INVASÃO NOITE TOTAL</h1>
        <p><strong>W, A, S, D</strong> para fugir | <strong>CLIQUE</strong> para eliminar</p>
        
        <div class="ranking-list" id="ranking">
            <strong>TOP RECORDES:</strong><br>
            <div id="ranking-data">Carregando...</div>
        </div>
        
        <button style="padding: 10px 20px; cursor:pointer; margin-top:15px; font-weight:bold">INICIAR MISSÃO</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let score = 0;
        const scoreEl = document.getElementById('score');
        const rankingDataEl = document.getElementById('ranking-data');

        function updateRankingUI() {
            const saves = JSON.parse(localStorage.getItem('fps_ranking') || '[]');
            rankingDataEl.innerHTML = saves.length ? 
                saves.map((s, i) => `${i+1}º - ${s} eliminações`).join('<br>') : 
                "Nenhum recorde ainda.";
        }
        updateRankingUI();

        function saveScore(finalScore) {
            if(finalScore <= 0) return;
            let saves = JSON.parse(localStorage.getItem('fps_ranking') || '[]');
            saves.push(finalScore);
            saves.sort((a, b) => b - a);
            saves = saves.slice(0, 5);
            localStorage.setItem('fps_ranking', JSON.stringify(saves));
            updateRankingUI();
        }

        // --- Configuração da Cena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010103);
        scene.fog = new THREE.Fog(0x010103, 1, 55);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        document.body.appendChild(renderer.domElement);

        // --- ILUMINAÇÃO REFORMULADA ---

        // 1. Lanterna do Jogador (Luz Spot)
        const lanterna = new THREE.SpotLight(0xffffff, 100);
        lanterna.angle = Math.PI / 6.5; // Mais fechada para parecer tática
        lanterna.penumbra = 0.4;
        lanterna.distance = 40;
        lanterna.castShadow = true;
        camera.add(lanterna);
        lanterna.target.position.set(0, 0, -10);
        camera.add(lanterna.target);
        scene.add(camera);

        // 2. Luz de Flash do Tiro (Muzzle Flash)
        const muzzleFlash = new THREE.PointLight(0xffaa00, 0, 15);
        muzzleFlash.position.set(0.4, -0.3, -1);
        camera.add(muzzleFlash);

        // 3. Luz Hemisférica (Dá cor às sombras - Azul Noite)
        const ambientLight = new THREE.HemisphereLight(0x111122, 0x000000, 0.5);
        scene.add(ambientLight);

        // 4. Postes de Rua Dinâmicos
        function createStreetLight(x, z) {
            const group = new THREE.Group();
            
            // Poste físico
            const pole = new THREE.Mesh(new THREE.BoxGeometry(0.2, 6, 0.2), new THREE.MeshStandardMaterial({color: 0x111111}));
            pole.position.y = 3;
            
            // Lâmpada (Visual e Luz)
            const light = new THREE.PointLight(0xffaa22, 25, 20);
            light.position.y = 5.8;
            light.castShadow = true;

            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({color: 0xffaa22}));
            bulb.position.y = 5.8;
            
            group.add(pole, light, bulb);
            group.position.set(x, 0, z);
            scene.add(group);
        }

        // Espalhando postes estrategicamente
        for(let x = -40; x <= 40; x += 40) {
            for(let z = -40; z <= 40; z += 40) {
                if(x === 0 && z === 0) continue;
                createStreetLight(x, z);
            }
        }

        // --- Cenário ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(300, 300),
            new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.8 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Arma ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.18, 0.7), new THREE.MeshStandardMaterial({color: 0x050505}));
        gunBody.position.set(0.4, -0.3, -0.6);
        gunGroup.add(gunBody);
        camera.add(gunGroup);

        // --- NPCs ---
        const npcList = [];
        const npcHitboxes = [];

        function spawnNPC() {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0x332211 }); // Mais escuro para o clima
            const clothesMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), skinMat);
            head.position.y = 1.6;
            
            // LUZ DOS OLHOS (Faz o NPC ser visível no escuro)
            const eyeLight = new THREE.PointLight(0xff0000, 1.5, 3);
            eyeLight.position.set(0, 1.65, -0.2);
            group.add(eyeLight);

            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), clothesMat);
            torso.position.y = 1.1;
            torso.castShadow = true;

            group.add(head, torso);
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 35 + Math.random() * 10;
            group.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
            scene.add(group);

            const hitbox = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2.2, 1), 
                new THREE.MeshBasicMaterial({ visible: false })
            );
            scene.add(hitbox);

            npcList.push({ 
                visual: group, hitbox,
                speed: 0.05 + Math.random() * 0.06, animStep: Math.random() * 10 
            });
            npcHitboxes.push(hitbox);
        }

        for(let i=0; i<12; i++) spawnNPC();

        // --- Controles e Ações ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => controls.lock());
        
        controls.addEventListener('lock', () => { instructions.style.display = 'none'; score = 0; scoreEl.innerText = score; });
        controls.addEventListener('unlock', () => { instructions.style.display = 'block'; saveScore(score); });

        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousedown', () => {
            if(!controls.isLocked) return;
            
            // Efeito de Clarão do Tiro
            muzzleFlash.intensity = 50;
            gunGroup.position.z = 0.15;
            setTimeout(() => { muzzleFlash.intensity = 0; gunGroup.position.z = 0; }, 50);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(npcHitboxes);
            
            if(hits.length > 0) {
                const hit = hits[0].object;
                const index = npcList.findIndex(n => n.hitbox === hit);
                if(index > -1) {
                    scene.remove(npcList[index].visual);
                    scene.remove(hit);
                    npcList.splice(index, 1);
                    npcHitboxes.splice(npcHitboxes.indexOf(hit), 1);
                    score++;
                    scoreEl.innerText = score;
                    spawnNPC();
                }
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                if(keys['KeyW']) controls.moveForward(0.12);
                if(keys['KeyS']) controls.moveForward(-0.1);
                if(keys['KeyA']) controls.moveRight(-0.1);
                if(keys['KeyD']) controls.moveRight(0.1);

                npcList.forEach(npc => {
                    npc.visual.lookAt(camera.position.x, 0, camera.position.z);
                    const dir = new THREE.Vector3();
                    dir.subVectors(camera.position, npc.visual.position).normalize();
                    npc.visual.position.x += dir.x * npc.speed;
                    npc.visual.position.z += dir.z * npc.speed;
                    npc.hitbox.position.copy(npc.visual.position).y = 1;

                    if(npc.visual.position.distanceTo(camera.position) < 1.5) {
                        const flash = document.getElementById('damage-flash');
                        flash.style.opacity = "0.5";
                        setTimeout(() => flash.style.opacity = "0", 50);
                    }
                });
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
