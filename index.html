<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Realista - Invasão com Ranking</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border: 1px solid white;
        }
        #instructions {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.9);
            padding: 30px; text-align: center; border-radius: 10px;
            cursor: pointer; border: 2px solid #555; z-index: 10;
        }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: white; font-size: 24px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: red; opacity: 0; pointer-events: none;
            transition: opacity 0.1s;
        }
        .ranking-list {
            margin-top: 15px;
            text-align: left;
            font-size: 14px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">Eliminações: <span id="score">0</span></div>
    <div id="damage-flash"></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>INVASÃO NPC</h1>
        <p><strong>W, A, S, D</strong> para fugir | <strong>CLIQUE</strong> para eliminar</p>
        
        <div class="ranking-list" id="ranking">
            <strong>TOP RECORDES:</strong><br>
            <div id="ranking-data">Carregando...</div>
        </div>
        
        <button style="padding: 10px 20px; cursor:pointer; margin-top:15px; font-weight:bold">INICIAR MISSÃO</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Variáveis de Jogo ---
        let score = 0;
        const scoreEl = document.getElementById('score');
        const rankingDataEl = document.getElementById('ranking-data');

        // Carregar Ranking do LocalStorage
        function updateRankingUI() {
            const saves = JSON.parse(localStorage.getItem('fps_ranking') || '[]');
            rankingDataEl.innerHTML = saves.length ? 
                saves.map((s, i) => `${i+1}º - ${s} eliminações`).join('<br>') : 
                "Nenhum recorde ainda.";
        }
        updateRankingUI();

        function saveScore(finalScore) {
            if(finalScore <= 0) return;
            let saves = JSON.parse(localStorage.getItem('fps_ranking') || '[]');
            saves.push(finalScore);
            saves.sort((a, b) => b - a);
            saves = saves.slice(0, 5); // Top 5
            localStorage.setItem('fps_ranking', JSON.stringify(saves));
            updateRankingUI();
        }

        // --- Cena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x020205, 1, 45);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Iluminação Melhorada ---
        // 1. Lanterna do Jogador
        const lanterna = new THREE.SpotLight(0xffffff, 80);
        lanterna.angle = Math.PI / 7;
        lanterna.penumbra = 0.4;
        lanterna.castShadow = true;
        camera.add(lanterna);
        lanterna.target.position.set(0, 0, -5);
        camera.add(lanterna.target);
        scene.add(camera);

        // 2. Luz Ambiente (Luar fraco)
        scene.add(new THREE.AmbientLight(0x111122, 0.4));

        // 3. Postes de Luz Estratégicos
        function createStreetLight(x, z) {
            const group = new THREE.Group();
            // Poste
            const pole = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, 0.2), new THREE.MeshStandardMaterial({color: 0x111111}));
            pole.position.y = 2.5;
            // Lâmpada
            const light = new THREE.PointLight(0xffaa22, 15, 15);
            light.position.y = 5;
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffaa22}));
            bulb.position.y = 5;
            
            group.add(pole, light, bulb);
            group.position.set(x, 0, z);
            scene.add(group);
        }
        createStreetLight(10, -10);
        createStreetLight(-15, -25);
        createStreetLight(5, -40);

        // --- Cenário ---
        const grid = new THREE.GridHelper(200, 80, 0x222233, 0x111122);
        scene.add(grid);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x0a0a0a })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Arma ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.18, 0.7), new THREE.MeshStandardMaterial({color: 0x080808}));
        gunBody.position.set(0.4, -0.3, -0.6);
        gunGroup.add(gunBody);
        camera.add(gunGroup);

        // --- NPCs ---
        const npcList = [];
        const npcHitboxes = [];

        function spawnNPC() {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xc49a6c });
            const clothesMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), skinMat);
            head.position.y = 1.6;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), clothesMat);
            torso.position.y = 1.1;
            
            const legGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2);
            const lLeg = new THREE.Mesh(legGeo, clothesMat); lLeg.position.set(-0.15, 0.35, 0);
            const rLeg = new THREE.Mesh(legGeo, clothesMat); rLeg.position.set(0.15, 0.35, 0);

            const armGeo = new THREE.BoxGeometry(0.15, 0.6, 0.15);
            const lArm = new THREE.Mesh(armGeo, skinMat); lArm.position.set(-0.35, 1.2, 0);
            const rArm = new THREE.Mesh(armGeo, skinMat); rArm.position.set(0.35, 1.2, 0);

            group.add(head, torso, lLeg, rLeg, lArm, rArm);
            
            // Spawn circular ao redor do player
            const angle = Math.random() * Math.PI * 2;
            const dist = 30 + Math.random() * 10;
            group.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
            scene.add(group);

            const hitbox = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2.2, 1), 
                new THREE.MeshBasicMaterial({ visible: false })
            );
            scene.add(hitbox);

            npcList.push({ 
                visual: group, hitbox, lLeg, rLeg, lArm, rArm,
                speed: 0.05 + Math.random() * 0.06, animStep: Math.random() * 10 
            });
            npcHitboxes.push(hitbox);
        }

        for(let i=0; i<10; i++) spawnNPC();

        // --- Controles ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => controls.lock());
        
        controls.addEventListener('lock', () => {
            instructions.style.display = 'none';
            score = 0; scoreEl.innerText = score;
        });
        
        controls.addEventListener('unlock', () => {
            instructions.style.display = 'block';
            saveScore(score);
        });

        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.addEventListener('mousedown', () => {
            if(!controls.isLocked) return;
            gunGroup.position.z = 0.2; 
            setTimeout(() => gunGroup.position.z = 0, 50);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(npcHitboxes);
            
            if(hits.length > 0) {
                const hit = hits[0].object;
                const index = npcList.findIndex(n => n.hitbox === hit);
                if(index > -1) {
                    scene.remove(npcList[index].visual);
                    scene.remove(hit);
                    npcList.splice(index, 1);
                    npcHitboxes.splice(npcHitboxes.indexOf(hit), 1);
                    score++;
                    scoreEl.innerText = score;
                    spawnNPC(); // Mantém o desafio constante
                }
            }
        });

        // --- Loop Principal ---
        const flash = document.getElementById('damage-flash');
        
        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                if(keys['KeyW']) controls.moveForward(0.13);
                if(keys['KeyS']) controls.moveForward(-0.1);
                if(keys['KeyA']) controls.moveRight(-0.1);
                if(keys['KeyD']) controls.moveRight(0.1);

                npcList.forEach(npc => {
                    npc.visual.lookAt(camera.position.x, 0, camera.position.z);
                    const dir = new THREE.Vector3();
                    dir.subVectors(camera.position, npc.visual.position).normalize();
                    
                    npc.visual.position.x += dir.x * npc.speed;
                    npc.visual.position.z += dir.z * npc.speed;
                    npc.hitbox.position.copy(npc.visual.position).y = 1;

                    npc.animStep += 0.22;
                    const swing = Math.sin(npc.animStep) * 0.6;
                    npc.lLeg.rotation.x = swing; npc.rLeg.rotation.x = -swing;
                    npc.lArm.rotation.x = -swing; npc.rArm.rotation.x = swing;
                    npc.visual.position.y = Math.abs(Math.cos(npc.animStep)) * 0.12;

                    if(npc.visual.position.distanceTo(camera.position) < 1.4) {
                        flash.style.opacity = "0.5";
                        setTimeout(() => flash.style.opacity = "0", 50);
                    }
                });
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
