<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Realista - Sobrevivência</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border: 1px solid white;
        }
        #instructions {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.9);
            padding: 30px; text-align: center; border-radius: 10px;
            cursor: pointer; border: 2px solid #555; z-index: 10;
        }
        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: red; opacity: 0; pointer-events: none;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

    <div id="damage-flash"></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>INVASÃO NPC</h1>
        <p>Eles estão vindo atrás de você!</p>
        <p><strong>W, A, S, D</strong> para fugir | <strong>CLIQUE</strong> para eliminar</p>
        <button style="padding: 10px 20px; cursor:pointer; margin-top:10px">JOGAR</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Cena e Renderização ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 5, 40);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Iluminação ---
        const light = new THREE.PointLight(0xffffff, 50, 100);
        camera.add(light); // Luz acoplada à câmera (lanterna)
        scene.add(camera);
        scene.add(new THREE.AmbientLight(0x111111));

        // --- Chão ---
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Arma do Jogador (Visual) ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
        gunBody.position.set(0.3, -0.2, -0.4);
        gunGroup.add(gunBody);
        camera.add(gunGroup);

        // --- Gerenciamento de NPCs ---
        const npcList = [];
        const npcHitboxes = [];

        function createEnemy(x, z) {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xddaa88 });
            const clothesMat = new THREE.MeshStandardMaterial({ color: 0x222244 });

            // Corpo
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), skinMat);
            head.position.y = 1.6;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), clothesMat);
            torso.position.y = 1.1;
            
            // Pernas
            const legGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2);
            const lLeg = new THREE.Mesh(legGeo, clothesMat); lLeg.position.set(-0.15, 0.35, 0);
            const rLeg = new THREE.Mesh(legGeo, clothesMat); rLeg.position.set(0.15, 0.35, 0);

            group.add(head, torso, lLeg, rLeg);

            // Braços em posição de ataque
            const armGeo = new THREE.BoxGeometry(0.15, 0.5, 0.15);
            const lArm = new THREE.Mesh(armGeo, skinMat); 
            lArm.position.set(-0.35, 1.2, -0.2); 
            lArm.rotation.x = -Math.PI/3; // Braço para frente
            group.add(lArm);

            group.position.set(x, 0, z);
            scene.add(group);

            // Hitbox para tiro
            const hitbox = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 1.8, 0.8), 
                new THREE.MeshBasicMaterial({ visible: false })
            );
            hitbox.position.copy(group.position);
            hitbox.position.y = 0.9;
            hitbox.userData.visual = group;
            scene.add(hitbox);

            npcList.push({ visual: group, hitbox: hitbox, speed: 0.03 + Math.random() * 0.04 });
            npcHitboxes.push(hitbox);
        }

        for(let i=0; i<12; i++) createEnemy(Math.random()*60-30, Math.random()*-60-10);

        // --- Controles ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'block');

        let moveF = false, moveB = false, moveL = false, moveR = false;
        document.addEventListener('keydown', (e) => {
            if(e.code==='KeyW') moveF=true; if(e.code==='KeyS') moveB=true;
            if(e.code==='KeyA') moveL=true; if(e.code==='KeyD') moveR=true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code==='KeyW') moveF=false; if(e.code==='KeyS') moveB=false;
            if(e.code==='KeyA') moveL=false; if(e.code==='KeyD') moveR=false;
        });

        // --- Atirar ---
        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', () => {
            if(!controls.isLocked) return;

            // Animação de coice da arma
            gunGroup.position.z = 0.1;
            setTimeout(() => gunGroup.position.z = 0, 50);

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(npcHitboxes);
            
            if(hits.length > 0) {
                const hit = hits[0].object;
                scene.remove(hit.userData.visual);
                scene.remove(hit);
                const index = npcList.findIndex(n => n.hitbox === hit);
                if(index > -1) npcList.splice(index, 1);
                npcHitboxes.splice(npcHitboxes.indexOf(hit), 1);
            }
        });

        // --- Loop de IA e Animação ---
        const flash = document.getElementById('damage-flash');
        
        function animate() {
            requestAnimationFrame(animate);
            
            if(controls.isLocked) {
                // Movimento Jogador
                if(moveF) controls.moveForward(0.15);
                if(moveB) controls.moveForward(-0.1);
                if(moveL) controls.moveRight(-0.1);
                if(moveR) controls.moveRight(0.1);

                // IA dos NPCs
                npcList.forEach(npc => {
                    // Olhar para o jogador (apenas no eixo Y)
                    npc.visual.lookAt(camera.position.x, 0, camera.position.z);
                    
                    // Mover em direção ao jogador
                    const dir = new THREE.Vector3();
                    dir.subVectors(camera.position, npc.visual.position).normalize();
                    
                    npc.visual.position.x += dir.x * npc.speed;
                    npc.visual.position.z += dir.z * npc.speed;
                    
                    // Atualizar hitbox
                    npc.hitbox.position.x = npc.visual.position.x;
                    npc.hitbox.position.z = npc.visual.position.z;

                    // Detectar Dano (proximidade)
                    const dist = npc.visual.position.distanceTo(camera.position);
                    if(dist < 1.5) {
                        flash.style.opacity = "0.5";
                        setTimeout(() => flash.style.opacity = "0", 50);
                    }
                });
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
