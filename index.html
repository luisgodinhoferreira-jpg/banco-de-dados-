<script>
    document.getElementById('cadastroForm').addEventListener('submit', function(event) {
        // 1. Impede o formulário de recarregar a página
        event.preventDefault();

        // 2. Coleta o nome para personalizar a mensagem (opcional)
        const nome = document.getElementById('nome').value;

        // 3. Substitui o conteúdo do formulário pela mensagem de sucesso
        this.innerHTML = `
            <div style="text-align: center; padding: 20px;">
                <div style="font-size: 50px; color: #4CAF50; margin-bottom: 20px;">✔</div>
                <h2 style="color: #333;">Cadastro realizado!</h2>
                <p style="color: #666;">O cliente <strong>${nome}</strong> foi registrado com sucesso no sistema.</p>
                <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer; border: none; background: #007BFF; color: white; border-radius: 5px;">Novo Cadastro</button>
            </div>
        `;
    });
</script>
