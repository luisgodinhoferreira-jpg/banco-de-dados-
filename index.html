
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futebol Estelar Neon | Luis Gustavo</title>
    
    <style>
        :root {
            --neon-color: #0fa;
            --neon-glow: rgba(0, 255, 170, 0.4);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b101a;
            background-image: 
                linear-gradient(rgba(11, 16, 26, 0.8), rgba(11, 16, 26, 0.9)), 
                url('https://images.unsplash.com/photo-1543477380-60b6d27431e7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        /* EFEITO ESPECIAL 1: Partículas Flutuantes de Fundo */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: stars-move 100s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes stars-move {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        .card {
            background-color: rgba(10, 15, 30, 0.85);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 170, 0.05);
            text-align: center;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 255, 170, 0.2);
            max-width: 550px;
            width: 100%;
            position: relative;
            z-index: 1;
            overflow: hidden; /* Necessário para o efeito de brilho */
            animation: card-entry 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* EFEITO ESPECIAL 2: Varredura de Luz (Shiny Effect) */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        @keyframes card-entry {
            from { opacity: 0; transform: scale(0.9) translateY(50px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .title-link { text-decoration: none; display: inline-block; }

        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
            animation: flicker 3s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-color), 0 0 40px var(--neon-color); }
            20%, 24%, 55% { text-shadow: none; opacity: 0.7; }
        }

        .tabela-jogos {
            width: 100%;
            margin: 25px 0;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tabela-jogos th {
            border-bottom: 2px solid var(--neon-color);
            padding: 15px;
            color: var(--neon-color);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            background-color: rgba(0, 255, 170, 0.05);
        }

        .tabela-jogos td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .tabela-jogos tr:hover td {
            background: rgba(0, 255, 170, 0.05);
            color: var(--neon-color);
        }

        /* EFEITO ESPECIAL 3: Pulso nos nomes dos times */
        .time { 
            font-weight: bold; 
            color: #fff; 
            text-shadow: 0 0 5px rgba(255,255,255,0.2);
        }
        
        tr:hover .time {
            animation: pulse-text 1s infinite;
        }

        @keyframes pulse-text {
            0% { text-shadow: 0 0 5px var(--neon-color); }
            50% { text-shadow: 0 0 15px var(--neon-color); }
            100% { text-shadow: 0 0 5px var(--neon-color); }
        }

        .vs { color: var(--neon-color); font-size: 0.7rem; margin: 0 8px; opacity: 0.8; }

        .btn-neon {
            display: inline-block;
            padding: 14px 35px;
            color: var(--neon-color);
            text-decoration: none;
            border: 2px solid var(--neon-color);
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.5s;
            box-shadow: 0 0 15px var(--neon-glow);
            margin-bottom: 10px;
            position: relative;
        }

        .btn-neon:hover {
            background-color: var(--neon-color);
            color: #0b101a;
            box-shadow: 0 0 40px var(--neon-color);
            transform: scale(1.05);
        }

        .footer-credit {
            margin-top: 25px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .footer-credit span {
            color: var(--neon-color);
            font-weight: bold;
            text-shadow: 0 0 8px var(--neon-glow);
        }
    </style>
</head>
<body>

    <div class="card">
        <a href="https://www.flashscore.com.br/" target="_blank" class="title-link">
            <h1>FUTEBOL ESTELAR</h1>
        </a>
        
        <p style="color: #888; margin-top: 0; font-size: 0.9rem; letter-spacing: 1px;">SISTEMA MONITORADO</p>

        <table class="tabela-jogos">
            <thead>
                <tr>
                    <th>STATUS</th>
                    <th>CONFRONTO</th>
                    <th>HORÁRIO</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="color: #ff4d4d; font-size: 0.7rem;">● AO VIVO</td>
                    <td><span class="time">FLA</span> <span class="vs">VS</span> <span class="time">PAL</span></td>
                    <td>21:30</td>
                </tr>
                <tr>
                    <td>AGENDADO</td>
                    <td><span class="time">COR</span> <span class="vs">VS</span> <span class="time">SAO</span></td>
                    <td>16:00</td>
                </tr>
                <tr>
                    <td>AGENDADO</td>
                    <td><span class="time">GRE</span> <span class="vs">VS</span> <span class="time">INT</span></td>
                    <td>20:00</td>
                </tr>
            </tbody>
        </table>
        
        <a href="https://ge.globo.com/futebol/brasileirao-serie-a/" target="_blank" class="btn-neon">
            ACESSAR DATA CENTER
        </a>

        <div class="footer-credit">
            Lead Developer: <span>Luis Gustavo</span>
        </div>
    </div>

</body>
</html>
