<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futebol Estelar Neon</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b101a;
            /* Imagem de fundo do estádio */
            background-image: 
                linear-gradient(rgba(11, 16, 26, 0.85), rgba(11, 16, 26, 0.85)), /* Escurece a imagem */
                url('https://images.unsplash.com/photo-1543477380-60b6d27431e7?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w0NDVjMDJ8MHwxfHNlYXJjaHw1fHxmdXRib2xsJTIwc3RhZGl1bXxlbnwwfHx8fDE3MTgxODU0OTF8MA&ixlib=rb-4.0.3&q=80&w=1080'); /* URL de uma imagem de estádio */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            padding: 20px;
            overflow: hidden; /* Para garantir que nada transborde */
            position: relative; /* Necessário para a pseudo-classe de efeito */
        }

        /* Adicionando um overlay sutil para intensificar o efeito estelar */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.07) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.5; /* Suaviza as estrelas sobre o estádio */
            z-index: -1; /* Fica atrás do conteúdo */
        }

        .card {
            background-color: rgba(10, 15, 30, 0.9); /* Um pouco mais opaco para legibilidade */
            padding: 2.5rem; /* Aumentei um pouco o padding */
            border-radius: 20px;
            box-shadow: 0 0 70px rgba(0, 255, 170, 0.2), 0 0 30px rgba(0, 255, 170, 0.1); /* Brilho mais intenso no card */
            text-align: center;
            backdrop-filter: blur(20px); /* Blur mais forte */
            border: 1px solid rgba(0, 255, 170, 0.3); /* Borda mais visível */
            max-width: 550px; /* Aumentei um pouco a largura máxima */
            width: 100%;
            position: relative;
            z-index: 1; /* Garante que o card fique acima do background */
            animation: card-entry 1s ease-out; /* Animação de entrada do card */
        }

        @keyframes card-entry {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .title-link {
            text-decoration: none;
            display: inline-block;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 2.8rem; /* Título um pouco maior */
            text-transform: uppercase;
            text-shadow: 0 0 15px #0fa, 0 0 30px #0fa; /* Neon mais forte */
            animation: flicker 2s infinite alternate;
            transition: 0.3s;
        }

        h1:hover { transform: scale(1.08); } /* Efeito hover mais pronunciado */

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 12px #fff, 0 0 25px #0fa, 0 0 40px #0fa;
                opacity: 1;
            }
            20%, 22%, 24%, 55% { text-shadow: none; opacity: 0.85; }
        }

        /* Estilo da Tabela */
        .tabela-jogos {
            width: 100%;
            margin: 30px 0; /* Margem maior */
            border-collapse: collapse;
            font-size: 1rem; /* Fonte da tabela um pouco maior */
            background: rgba(0, 0, 0, 0.2); /* Fundo sutil para as linhas da tabela */
            border-radius: 10px;
            overflow: hidden; /* Para as bordas arredondadas funcionarem */
        }

        .tabela-jogos th {
            border-bottom: 2px solid #0fa; /* Borda mais grossa */
            padding: 12px;
            color: #0fa;
            text-transform: uppercase;
            letter-spacing: 1.5px; /* Espaçamento maior */
            background-color: rgba(0, 255, 170, 0.05); /* Um toque de cor no cabeçalho */
        }

        .tabela-jogos td {
            padding: 15px 12px; /* Aumentei o padding */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background-color 0.3s ease;
        }

        .tabela-jogos tbody tr:last-child td {
            border-bottom: none; /* Remove a borda da última linha */
        }

        .tabela-jogos tbody tr:hover {
            background-color: rgba(0, 255, 170, 0.08); /* Efeito hover nas linhas da tabela */
            cursor: pointer;
        }

        .time { font-weight: bold; color: #fff; }
        .vs { color: #0fa; font-size: 0.8rem; margin: 0 8px; } /* VS um pouco maior */

        .btn-neon {
            display: inline-block;
            padding: 14px 30px; /* Botão um pouco maior */
            color: #0fa;
            text-decoration: none;
            border: 2px solid #0fa;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); /* Transição mais suave */
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.3); /* Sombra mais intensa */
            letter-spacing: 1px;
            margin-top: 15px; /* Espaço do botão */
        }

        .btn-neon:hover {
            background-color: #0fa;
            color: #0b101a;
            box-shadow: 0 0 40px #0fa, 0 0 10px rgba(0, 255, 170, 0.5); /* Brilho mais forte no hover */
            transform: translateY(-3px); /* Leve elevação no hover */
        }
    </style>
</head>
<body>

    <div class="card">
        <a href="https://www.flashscore.com.br/" target="_blank" class="title-link">
            <h1>FUTEBOL ESTELAR</h1>
        </a>
        
        <p style="color: #bbb; margin-top: 0; font-size: 1.1rem; letter-spacing: 0.5px;">Próximas Partidas</p>

        <table class="tabela-jogos">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Confronto</th>
                    <th>Horário</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Hoje</td>
                    <td><span class="time">FLA</span> <span class="vs">VS</span> <span class="time">PAL</span></td>
                    <td>21:30</td>
                </tr>
                <tr>
                    <td>Amanhã</td>
                    <td><span class="time">COR</span> <span class="vs">VS</span> <span class="time">SAO</span></td>
                    <td>16:00</td>
                </tr>
                <tr>
                    <td>Amanhã</td>
                    <td><span class="time">BOT</span> <span class="vs">VS</span> <span class="time">CRU</span></td>
                    <td>18:30</td>
                </tr>
                 <tr>
                    <td>Qui, 20</td>
                    <td><span class="time">GRE</span> <span class="vs">VS</span> <span class="time">INT</span></td>
                    <td>20:00</td>
                </tr>
            </tbody>
        </table>
        
        <a href="https://ge.globo.com/futebol/brasileirao-serie-a/" target="_blank" class="btn-neon">
            Ver Tabela Completa
        </a>
    </div>

</body>
</html>
