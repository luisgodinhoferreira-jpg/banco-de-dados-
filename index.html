
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo das Bandeiras - Neon Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #05070a;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            cursor: crosshair;
        }

        .card {
            background-color: rgba(10, 20, 40, 0.8);
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4), 
                        inset 0 0 15px rgba(0, 212, 255, 0.2);
            z-index: 10;
            pointer-events: auto; 
        }

        /* Estilo para o link no título */
        .card h1 a {
            color: #fff; 
            text-decoration: none; /* Remove o sublinhado padrão */
            display: block;
            text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
            transition: transform 0.3s ease;
        }

        .card h1 a:hover {
            transform: scale(1.05); /* Pequeno efeito ao passar o mouse */
            text-shadow: 0 0 15px #00d4ff, 0 0 30px #00d4ff;
        }

        .bandeira {
            position: absolute;
            font-size: 2.5rem;
            user-select: none;
            pointer-events: none;
            animation: aparecer 0.5s ease-out;
            filter: drop-shadow(0 0 8px #00d4ff);
        }

        @keyframes aparecer {
            from { transform: scale(0) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        h1 { margin: 0; font-size: 2.5rem; }

        p { 
            color: #00d4ff; 
            margin-top: 10px; 
            font-weight: 500; 
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
        } 
    </style>
</head>
<body>

    <div class="card">
        <h1>
            <a href="https://www.nasa.gov/directorates/esdmd/nasa-strengthens-artemis-adds-mission-refines-overall-architecture/" target="_blank">
                Olá, Mundo! 🌎
            </a>
        </h1>
        <p>Clique para iluminar o mapa!</p>
    </div>

    <script>
        const bandeiras = ['🇧🇷', '🇵🇹', '🇺🇸', '🇯🇵', '🇦🇷', '🇨🇦', '🇫🇷', '🇩🇪', '🇮🇹', '🇰🇷'];

        document.addEventListener('click', (evento) => {
            // Evita criar bandeira se clicar no link (opcional, remova se quiser bandeiras no link também)
            if (evento.target.tagName === 'A') return;

            const span = document.createElement('span');
            span.className = 'bandeira';
            
            const bandeiraAleatoria = bandeiras[Math.floor(Math.random() * bandeiras.length)];
            span.innerText = bandeiraAleatoria;

            span.style.left = (evento.clientX - 25) + 'px';
            span.style.top = (evento.clientY - 25) + 'px';

            document.body.appendChild(span);

            setTimeout(() => {
                span.style.transition = "opacity 1s, transform 1s";
                span.style.opacity = "0";
                span.style.transform = "translateY(-20px) scale(1.2)";
                setTimeout(() => span.remove(), 1000);
            }, 2000);
        });
    </script>

</body>
</html>
